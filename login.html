<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Village Survey System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }
        
        .login-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        
        .setup-btn {
            background: #48bb78;
            margin-top: 10px;
        }
        
        .setup-btn:hover {
            background: #38a169;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏘️ Village Survey System</h1>
        <div id="loginForm">
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button onclick="login()">Login</button>
            <button class="setup-btn" onclick="showSetup()">First Time Setup</button>
            <div id="error" class="error"></div>
        </div>
    </div>

    <script>
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        async function login() {
            const password = document.getElementById('password').value;
            const hashedPassword = await hashPassword(password);
            const storedHash = localStorage.getItem('passwordHash');
            
            if (storedHash && storedHash === hashedPassword) {
                localStorage.setItem('loggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                document.getElementById('error').textContent = 'Invalid password';
            }
        }
        
        function showSetup() {
            const password = prompt('Set your password (min 6 characters):');
            if (password && password.length >= 6) {
                hashPassword(password).then(hash => {
                    localStorage.setItem('passwordHash', hash);
                    alert('Password set successfully! Please login.');
                });
            } else {
                alert('Password must be at least 6 characters');
            }
        }
        
        // Check if already logged in
        if (localStorage.getItem('loggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
